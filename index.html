        // LÓGICAS DE CÁLCULO ATUALIZADAS (Média/Soma e % de Atingimento c/ Farol)
        function getDocValue(d, kpi) {
            // Se o KPI usar múltiplas chaves (ex: Visão Global somando várias redes)
            if (kpi.dataKeys) {
                let sum = 0;
                let count = 0;
                kpi.dataKeys.forEach(key => {
                    let v = parseFloat(d[key] || 0);
                    if (v > 0) { sum += v; count++; }
                });
                if (kpi.agg === 'avg') return count > 0 ? sum / count : 0;
                return sum;
            }
            return parseFloat(d[kpi.dataKey] || 0);
        }

        function getAggregatedValue(dataArray, kpi) {
            if (!dataArray || dataArray.length === 0) return 0;
            let sum = 0;
            let count = 0;
            dataArray.forEach(d => {
                const val = getDocValue(d, kpi);
                if (val > 0) { // Considerar apenas meses com dados inseridos
                    sum += val;
                    count++;
                }
            });
            if (count === 0) return 0;
            return kpi.agg === 'avg' ? sum / count : sum;
        }

        function calculateAchievement(value, target, inverseLogic) {
            if (!target || target === 0) return { percent: 0, status: 'slate', label: 'SEM META' };
            
            let percent = 0;
            if (inverseLogic) {
                // Ex: CPM. Meta 8,00, Valor 4,00 = (8/4)*100 = 200% de Atingimento
                percent = value === 0 ? 0 : (target / value) * 100;
            } else {
                // Ex: ER. Meta 2%, Valor 14% = (14/2)*100 = 700% de Atingimento
                percent = (value / target) * 100;
            }

            let status = 'red';
            let label = 'CRÍTICO';
            
            if (percent >= 100) {
                status = 'green';
                label = 'NO ALVO';
            } else if (percent >= 80) {
                status = 'yellow';
                label = 'ATENÇÃO';
            }

            return { percent, status, label };
        }

                (statusType === 'syncing' ? 'bg-indigo-500 animate-spin' :
                 statusType === 'success' ? 'bg-emerald-500 animate-pulse' :
                 statusType === 'error' ? 'bg-red-500' : 'bg-amber-500');
        }

        function initFirestore() {
            setDbStatus('Sincronizando...', 'syncing');
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics');
            
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => doc.data());
                data.sort((a, b) => a.timestamp - b.timestamp);
                state.firebaseData = data;
                if(data.length > 0) setDbStatus('Sincronizado via Firebase', 'success');
                else setDbStatus('Banco vazio. Vá em Inserir Dados.', 'warning');
                renderApp();
            }, (err) => {
                console.error(err);
                setDbStatus('Erro ao ler dados.', 'error');
            });
        }

        function getActiveData() {
            const data = state.firebaseData.length > 0 ? state.firebaseData : fallbackMonthlyData;
            if (state.timeRange === 'YTD' || state.isComparativeMode) return data;
            return data.filter(d => d.quarter === state.timeRange);
        }

        function getCurrentKPIs() {
            if (state.selectedArea === 'mkt') return kpiDataByArea.mkt[state.selectedNetwork];
            return kpiDataByArea[state.selectedArea] || kpiDataByArea['global'];
        }

        function destroyCharts() {
            state.charts.forEach(chart => chart.destroy());
            state.charts = [];
        }

        function renderApp() {
            renderSidebar();
            const mainContent = document.getElementById('main-content');
            
            if (state.activeTab === 'dashboard') {
                document.getElementById('header-title').innerText = 'Painel de Desempenho';
                mainContent.innerHTML = buildDashboardHTML();
                
                document.getElementById('time-filter').addEventListener('change', (e) => { state.timeRange = e.target.value; renderApp(); });
                
                const toggleComp = document.getElementById('toggle-comparative');
                if (toggleComp) {
                    toggleComp.addEventListener('change', (e) => { state.isComparativeMode = e.target.checked; renderApp(); });
                }

                document.querySelectorAll('.area-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        state.selectedArea = e.target.dataset.area;
                        if(state.selectedArea !== 'mkt') state.selectedNetwork = 'instagram';
                        renderApp();
                    });
                });

                document.querySelectorAll('.network-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        state.selectedNetwork = e.target.closest('button').dataset.network;
                        renderApp();
                    });
                });

                renderCharts();
            } else {
                document.getElementById('header-title').innerText = 'Inserção de Dados Mensais';
                mainContent.innerHTML = buildManualEntryHTML();
                attachManualEntryListeners();
            }
            lucide.createIcons();
        }

        function renderSidebar() {
            const nav = document.getElementById('nav-menu');
            const items = [{ id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard Central' }, { id: 'data', icon: 'edit-3', label: 'Inserir Dados' }];
            nav.innerHTML = items.map(item => `
                <button data-tab="${item.id}" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${state.activeTab === item.id ? 'bg-indigo-500/10 text-indigo-400 font-semibold' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-medium'}">
                    <i data-lucide="${item.icon}" class="w-4 h-4"></i><span class="text-sm">${item.label}</span>
                </button>
            `).join('');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => { state.activeTab = e.target.closest('button').dataset.tab; renderApp(); });
            });
        }

        function buildDashboardHTML() {
            const activeData = getActiveData();
            const currentKPIs = getCurrentKPIs();

            const areaFiltersHTML = areasList.map(area => `
                <button data-area="${area.id}" class="area-btn px-4 py-2.5 rounded-xl text-sm font-semibold transition-all whitespace-nowrap ${state.selectedArea === area.id ? 'bg-slate-900 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}">${area.name}</button>
            `).join('');

            let subFilterHTML = '';
            if (state.selectedArea === 'mkt') {
                const networks = [{ id: 'instagram', label: 'Instagram', icon: 'instagram' }, { id: 'linkedin', label: 'LinkedIn', icon: 'linkedin' }, { id: 'youtube', label: 'YouTube', icon: 'youtube' }, { id: 'tiktok', label: 'TikTok', icon: 'smartphone' }];
                subFilterHTML = `
                <div class="flex flex-col md:flex-row md:items-center gap-3 mt-4 mb-2 fade-in">
                    <div class="text-sm font-semibold text-slate-400 flex items-center gap-1 shrink-0">Rede Social <i data-lucide="chevron-right" class="w-4 h-4"></i></div>
                    <div class="flex bg-white rounded-xl shadow-sm border border-slate-200/60 p-1 overflow-x-auto hide-scrollbar max-w-full">
                        ${networks.map(net => `
                            <button data-network="${net.id}" class="network-btn whitespace-nowrap flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${state.selectedNetwork === net.id ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}">
                                <i data-lucide="${net.icon}" class="w-4 h-4"></i> ${net.label}
                            </button>
                        `).join('')}
                    </div>
                </div>`;
            }

            // Geração dos Cards atualizada com Atingimento e Farol
            const kpisHTML = currentKPIs.map(kpi => {
                const aggValue = getAggregatedValue(activeData, kpi);
                const valFormatted = formatValue(aggValue, kpi.format);
                const targetFormatted = formatValue(kpi.numericTarget, kpi.format);
                
                const achv = calculateAchievement(aggValue, kpi.numericTarget, kpi.inverseLogic);
                
                let farolColor = 'bg-slate-200 text-slate-500';
                let farolBg = 'bg-slate-50';
                let iconStatus = 'circle';
                
                if (achv.status === 'green') { farolColor = 'text-emerald-500'; farolBg = 'bg-emerald-50 border-emerald-200'; iconStatus = 'check-circle-2'; }
                if (achv.status === 'red') { farolColor = 'text-red-500'; farolBg = 'bg-red-50 border-red-200'; iconStatus = 'x-circle'; }
                if (achv.status === 'yellow') { farolColor = 'text-amber-500'; farolBg = 'bg-amber-50 border-amber-200'; iconStatus = 'alert-circle'; }

                return `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200/60 relative overflow-hidden transition-all duration-300 hover:shadow-md flex flex-col justify-between h-full">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-2">
                                <div class="p-2 rounded-xl bg-slate-50 border border-slate-100 text-slate-500">
                                    <i data-lucide="${kpi.iconName}" class="w-4 h-4"></i>
                                </div>
                                <h4 class="text-[12px] font-bold text-slate-500 leading-tight uppercase tracking-wide">${kpi.title}</h4>
                            </div>
                            
                            <!-- FAROL UI -->
                            <div class="flex items-center gap-1.5 px-2 py-1 rounded-md ${farolBg} border">
                                <i data-lucide="${iconStatus}" class="w-3.5 h-3.5 pattern-diagonal rounded-full ${farolColor}"></i>
                                <span class="text-[10px] font-bold ${farolColor} uppercase tracking-wider">${achv.label}</span>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <div class="flex items-end gap-2">
                                <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-none">${valFormatted}</h2>
                                <span class="text-xs font-semibold text-slate-400 mb-1">Média/Soma</span>
                            </div>
                            
                            <div class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between">
                                <div class="flex flex-col">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Atingimento</span>
                                    <span class="text-sm font-black ${farolColor}">${achv.percent.toFixed(2).replace('.', ',')}%</span>
                                </div>
                                <div class="flex flex-col text-right">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Meta</span>
                                    <span class="text-sm font-bold text-slate-600">${targetFormatted}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            const chartsHTML = currentKPIs.map(kpi => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200/60 flex flex-col h-[300px] min-w-0 overflow-hidden">
                    <div class="mb-2 flex justify-between items-center shrink-0">
                        <div class="min-w-0">
                            <h3 class="text-[15px] font-bold text-slate-800 tracking-tight truncate">${kpi.title}</h3>
                            <p class="text-[11px] text-slate-400 uppercase tracking-wider font-semibold truncate">
                                ${state.isComparativeMode ? 'Comparativo Trimestral' : 'Série Temporal c/ Predição'}
                            </p>
                        </div>
                    </div>
                    <div id="chart-${kpi.id}" class="w-full flex-1 min-h-0"></div>
                </div>
            `).join('');

            return `
                <div class="max-w-[1600px] mx-auto space-y-6 fade-in pb-10">
                    
                    <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200/60 flex flex-col xl:flex-row justify-between items-center gap-4">
                        <div class="flex items-center w-full xl:w-auto overflow-x-auto hide-scrollbar px-2">
                            <div class="flex space-x-1">${areaFiltersHTML}</div>
                        </div>
                        <div class="flex gap-3 w-full xl:w-auto px-2 pb-2 xl:pb-0 items-center">
                            
                            <!-- Toggle Modo Comparativo -->
                            <label class="flex items-center gap-2 cursor-pointer mr-2">
                                <div class="relative">
                                    <input type="checkbox" id="toggle-comparative" class="sr-only" ${state.isComparativeMode ? 'checked' : ''}>
                                    <div class="block bg-slate-200 w-10 h-6 rounded-full transition-colors ${state.isComparativeMode ? 'bg-indigo-500' : ''}"></div>
                                    <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${state.isComparativeMode ? 'transform translate-x-4' : ''}"></div>
                                </div>
                                <span class="text-xs font-bold text-slate-600 uppercase tracking-wider">Comparar Trimestres</span>
                            </label>

                            <div class="relative w-full xl:w-56 ${state.isComparativeMode ? 'opacity-50 pointer-events-none' : ''}">
                                <i data-lucide="calendar" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                                <select id="time-filter" class="w-full bg-slate-50 border border-slate-200 text-slate-700 font-medium text-sm rounded-xl focus:ring-2 focus:ring-indigo-500 block pl-10 p-2 outline-none cursor-pointer">
                                    <option value="Q1" ${state.timeRange==='Q1'?'selected':''}>1º Trimestre</option>
                                    <option value="Q2" ${state.timeRange==='Q2'?'selected':''}>2º Trimestre</option>
                                    <option value="Q3" ${state.timeRange==='Q3'?'selected':''}>3º Trimestre</option>
                                    <option value="Q4" ${state.timeRange==='Q4'?'selected':''}>4º Trimestre</option>
                                    <option value="YTD" ${state.timeRange==='YTD'?'selected':''}>Acumulado YTD</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    ${subFilterHTML}

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 2xl:grid-cols-6 gap-4">
                        ${kpisHTML}
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        ${chartsHTML}
                    </div>
                </div>
            `;
        }

        // Gera predição simples baseada nos últimos 3 meses
        function generateForecast(dataArray) {
            if (dataArray.length < 2) return [];
            let last3 = dataArray.slice(-3);
            let diffSum = 0;
            for(let i = 1; i < last3.length; i++) {
                diffSum += (last3[i] - last3[i-1]);
            }
            let avgStep = diffSum / (last3.length - 1);
            let lastVal = dataArray[dataArray.length - 1];
            
            // Projetar próximos 3 meses
            return [
                Math.max(0, lastVal + avgStep),
                Math.max(0, lastVal + avgStep * 2),
                Math.max(0, lastVal + avgStep * 3)
            ];
        }

        function renderCharts() {
            destroyCharts();
            const fullData = state.firebaseData.length > 0 ? state.firebaseData : fallbackMonthlyData;
            const activeData = getActiveData();
            const currentKPIs = getCurrentKPIs();

            currentKPIs.forEach(kpi => {
                let options = {};

                if (state.isComparativeMode) {
                    // MODO COMPARATIVO: Agrupar por Trimestre
                    const qData = { 'Q1': [], 'Q2': [], 'Q3': [], 'Q4': [] };
                    fullData.forEach(d => {
                        const hasData = kpi.dataKeys 
                            ? kpi.dataKeys.some(key => d[key] !== undefined)
                            : d[kpi.dataKey] !== undefined;
                            
                        if (hasData) qData[d.quarter].push(d);
                    });

                    const categories = ['Q1', 'Q2', 'Q3', 'Q4'];
                    const seriesData = categories.map(q => getAggregatedValue(qData[q], kpi));

                    options = {
                        series: [{ name: 'Resultado', data: seriesData }],
                        chart: { type: 'bar', height: '100%', toolbar: { show: false }, fontFamily: 'inherit' },
                        colors: ['#4f46e5'],
                        plotOptions: { bar: { borderRadius: 4, columnWidth: '50%' } },
                        dataLabels: { enabled: false },
                        xaxis: { categories: categories, axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#94a3b8' } } },
                        yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '11px' }, formatter: (value) => formatValue(value, kpi.format) } },
                        grid: { borderColor: '#f1f5f9', strokeDashArray: 4 },
                        tooltip: { y: { formatter: (value) => formatValue(value, kpi.format) } }
                    };

                } else {
                    // MODO NORMAL (Série Temporal + Predição)
                    const categories = activeData.map(d => d.month);
                    let seriesData = activeData.map(d => getDocValue(d, kpi));
                    
                    // Adicionar Predição para Visão Global ou YTD
                    let forecastCount = 0;
                    if (state.timeRange === 'YTD' || state.selectedArea === 'global') {
                        const predicted = generateForecast(seriesData);
                        if (predicted.length > 0) {
                            seriesData = [...seriesData, ...predicted];
                            // Adicionar categorias fictícias para predição se necessário
                            let nextMonths = ['M+1', 'M+2', 'M+3'];
                            categories.push(...nextMonths);
                            forecastCount = predicted.length;
                        }
                    }

                    let chartType = kpi.chartType;
                    let colors = ['#0ea5e9'];
                    if (chartType === 'line') colors = ['#f59e0b'];

                    options = {
                        series: [{ name: 'Realizado/Predição', data: seriesData }],
                        chart: { type: chartType === 'bar' ? 'line' : chartType, height: '100%', width: '100%', toolbar: { show: false }, fontFamily: 'inherit', parentHeightOffset: 0 },
                        colors: colors,
                        stroke: { 
                            curve: 'smooth', 
                            width: 3
                        },
                        forecastDataPoints: { count: forecastCount, dashArray: 4 }, // Configuração nativa de predição do ApexCharts
                        fill: { type: chartType === 'area' ? 'gradient' : 'solid' },
                        dataLabels: { enabled: false },
                        xaxis: { categories: categories, axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#94a3b8', fontSize: '11px' }, hideOverlappingLabels: true, trim: true } },
                        yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '11px' }, formatter: (value) => formatValue(value, kpi.format) } },
                        grid: { borderColor: '#f1f5f9', strokeDashArray: 4, padding: { left: 10, right: 10, bottom: 0 } },
                        annotations: { yaxis: [{ y: kpi.numericTarget, borderColor: '#cbd5e1', strokeDashArray: 4, label: { text: 'Meta', style: { color: '#fff', background: '#94a3b8', fontSize: '10px' } } }] },
                        tooltip: { theme: 'light', y: { formatter: (value) => formatValue(value, kpi.format) } }
                    };
                }

                const el = document.querySelector(`#chart-${kpi.id}`);
                if (el) {
                    const chart = new ApexCharts(el, options);
                    chart.render();
                    state.charts.push(chart);
                }
            });
        }

        function buildManualEntryHTML() {
            const def = formDefinitions[state.entryCategory];
            const monthOptions = monthsInfo.map(m => `<option value="${m.m}" ${state.entryMonth === m.m ? 'selected' : ''}>${m.m} (${m.q})</option>`).join('');
            const categoryOptions = Object.keys(formDefinitions).map(k => `<option value="${k}" ${state.entryCategory === k ? 'selected' : ''}>${formDefinitions[k].title}</option>`).join('');
            const formFields = def.fields.map(f => `
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">${f.label}</label>
                    <input type="number" step="any" id="input-${f.id}" class="manual-input w-full bg-slate-50 border border-slate-200 text-slate-800 text-lg font-bold rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white block p-3.5 outline-none transition-all shadow-sm" placeholder="0">
                </div>
            `).join('');

            return `
            <div class="max-w-4xl mx-auto space-y-6 fade-in mt-4 mb-10">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200/60 p-8 md:p-10 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
                    <div class="flex items-center gap-4 mb-2">
                        <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center shadow-inner"><i data-lucide="edit-3" class="w-7 h-7"></i></div>
                        <div><h2 class="text-2xl font-bold text-slate-800 tracking-tight">Inserção Direta de Dados</h2><p class="text-slate-500 text-sm">Insira os resultados exatos dos KPIs conforme as planilhas da sua área.</p></div>
                    </div>
                </div>
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200/60 p-8 md:p-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 pb-8 border-b border-slate-100">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Mês de Referência</label>
                            <div class="relative">
                                <i data-lucide="calendar" class="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-500 w-5 h-5"></i>
                                <select id="entry-month" class="w-full bg-indigo-50/50 border border-indigo-100 text-indigo-900 font-bold rounded-xl focus:ring-2 focus:ring-indigo-500 block pl-12 p-3.5 outline-none cursor-pointer appearance-none">${monthOptions}</select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Área para Inserção</label>
                            <div class="relative">
                                <i data-lucide="layers" class="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-500 w-5 h-5"></i>
                                <select id="entry-category" class="w-full bg-indigo-50/50 border border-indigo-100 text-indigo-900 font-bold rounded-xl focus:ring-2 focus:ring-indigo-500 block pl-12 p-3.5 outline-none cursor-pointer appearance-none">${categoryOptions}</select>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 mb-6">
                        <div class="p-2 bg-slate-100 text-slate-600 rounded-lg"><i data-lucide="${def.icon}" class="w-5 h-5"></i></div>
                        <h3 class="text-lg font-bold text-slate-800">Preenchimento: ${def.title}</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">${formFields}</div>
                    <div id="entry-msg-container" class="hidden mb-6 p-4 rounded-xl text-sm font-bold flex items-center gap-2 w-full"></div>
                    <div class="flex justify-end pt-6 border-t border-slate-100">
                        <button id="btn-save-entry" class="px-8 py-3.5 bg-slate-900 text-white rounded-xl font-bold hover:bg-indigo-600 shadow-lg shadow-slate-900/20 transition-all flex items-center gap-2">
                            <i data-lucide="save" class="w-5 h-5"></i> Salvar Dados
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function attachManualEntryListeners() {
            document.getElementById('entry-month').addEventListener('change', (e) => { state.entryMonth = e.target.value; renderApp(); });
            document.getElementById('entry-category').addEventListener('change', (e) => { state.entryCategory = e.target.value; renderApp(); });

            const btnSave = document.getElementById('btn-save-entry');
            const msgContainer = document.getElementById('entry-msg-container');

            const setMsg = (text, type) => {
                msgContainer.className = `p-4 rounded-xl text-sm font-bold flex items-center gap-2 mb-4 w-full ${
                    type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' :
                    type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-blue-50 text-blue-700 border border-blue-200'
                }`;
                const iconName = type === 'success' ? 'check-circle-2' : type === 'error' ? 'alert-circle' : 'loader-2';
                const spinClass = type === 'info' ? 'animate-spin' : '';
                msgContainer.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5 ${spinClass}"></i> ${text}`;
                msgContainer.classList.remove('hidden');
                lucide.createIcons();
            };

            btnSave.addEventListener('click', async () => {
                setMsg('Sincronizando com o Banco...', 'info');
                btnSave.disabled = true;
                try {
                    const def = formDefinitions[state.entryCategory];
                    const rawValues = {};
                    def.fields.forEach(f => {
                        const val = document.getElementById(`input-${f.id}`).value;
                        rawValues[f.id] = val ? parseFloat(val.replace(',', '.')) : 0;
                    });
                    
                    const mInfo = monthsInfo.find(m => m.m === state.entryMonth);
                    const dataToSave = { ...rawValues, month: mInfo.m, quarter: mInfo.q, timestamp: mInfo.t };
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics', state.entryMonth);
                    await setDoc(docRef, dataToSave, { merge: true });

                    setMsg(`Dados de ${def.title} guardados com sucesso!`, 'success');
                    def.fields.forEach(f => { document.getElementById(`input-${f.id}`).value = ''; });
                } catch (err) {
                    setMsg('Falha ao gravar no Firebase. Verifique sua conexão.', 'error');
                } finally {
                    btnSave.disabled = false;
                }
            });
        }

        // --- LÓGICA DO MENU MOBILE ---
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');

            function toggleSidebar() {
                if(!sidebar || !backdrop) return;
                sidebar.classList.toggle('-translate-x-full');
                backdrop.classList.toggle('hidden');
                setTimeout(() => backdrop.classList.toggle('opacity-0'), 10);
            }

            if(mobileBtn) mobileBtn.addEventListener('click', toggleSidebar);
            if(backdrop) backdrop.addEventListener('click', toggleSidebar);
            
            // Auto close na seleção (Apenas mobile)
            document.getElementById('nav-menu').addEventListener('click', (e) => {
                if (window.innerWidth < 768 && e.target.closest('.tab-btn')) {
                    toggleSidebar();
                }
            });
        });
    </script>
</body>
</html>
