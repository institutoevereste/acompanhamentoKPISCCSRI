</head>
<body class="bg-slate-50 font-sans text-slate-800 selection:bg-blue-100 h-screen overflow-hidden">

    <!-- TELA PRINCIPAL (APP) -->

                    <i data-lucide="activity" class="text-white w-5 h-5"></i>
                </div>

                    <h1 class="text-white font-bold text-[15px] tracking-wide">Inst. Evereste</h1>

        <!-- CONTEÚDO -->

    </div>

    <!-- SCRIPT PRINCIPAL: FIREBASE + LÓGICA DE NEGÓCIO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURAÇÃO FIREBASE E ESTADO GLOBAL
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCIdjGR-GYaPLpVe1KHKPH2B00EPsw926E",
            authDomain: "acompanhamentokpisccsri.firebaseapp.com",
            projectId: "acompanhamentokpisccsri",
            storageBucket: "acompanhamentokpisccsri.firebasestorage.app",
            messagingSenderId: "113426067945",
            appId: "1:113426067945:web:85de94f89bacc7b6a25b78",
            measurementId: "G-PGB5VJFVFC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'dashboard-evereste';

        let state = {
            activeTab: 'dashboard',
            selectedArea: 'global',
            selectedNetwork: 'instagram',
            timeRange: 'Q1',
            user: null,
            firebaseData: [],
            charts: [] 
        };

        // Dados de Fallback (Mock)
        const fallbackMonthlyData = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'].map((m, i) => {
            return {
                month: m, quarter: i < 3 ? 'Q1' : i < 6 ? 'Q2' : i < 9 ? 'Q3' : 'Q4', timestamp: i + 1,
                g_alc: 1000000 + (i * 45000), g_cpm: 4.5 - (i * 0.1), g_views: 2000 + (i * 150), g_evt: 1 + (i % 2),
                ig_cpm: 8.0 - (i * 0.35), ig_er: 2.0 + (i * 1.1), ig_ctr: 1.88 - (i * 0.05), ig_alc: 500000 + (i * 15000), ig_iec: 6250 + (i * 350), ig_cps: 4.0 - (i * 0.15),
                li_cpc: 40 - (i * 3), li_cpm: 15 - (i * 0.2), li_foll: 100 + (i * 20), li_er: 3.0 + (i * 0.1),
                yt_pmv: 40 + (i * 1.2), yt_vvr: 10000 + (i * 500), yt_subs: 50 + (i * 10), yt_imp: 80000 + (i * 2000),
                tk_tv: 30000 + (i * 2500), tk_er: 5.0 + (i * 0.5), tk_share: 500 + (i * 30), tk_cpv: 0.05 - (i * 0.003),
                jor_mat: 2 + (i % 2), jor_views: 100 + (i * 40), jor_ret: 40.0 - (i * 0.6), jor_clicks: 1000 + (i * 20),
                soc_res: 0, soc_colab: 0, soc_cap: 0, soc_proj: 0,
                evt_sat: 85 + (i * 0.8), evt_real: 0 + (i % 2), evt_part: 70 + (i * 5), evt_custo: 50 - (i * 0.4),
            };
        });

        const formatNumber = (num) => new Intl.NumberFormat('pt-BR', { notation: "compact", compactDisplay: "short" }).format(num || 0);
        const formatCurrency = (num) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(num || 0);
        const formatPercent = (num) => `${Number(num || 0).toFixed(1).replace('.', ',')}%`;
        
        const formatValue = (val, type) => {
            if (type === 'currency') return formatCurrency(val);
            if (type === 'percent') return formatPercent(val);
            return formatNumber(val);
        };

        const kpiDataByArea = {
            global: [
                { id: 'g1', title: "Alcance Total (Acumulado)", target: formatNumber(1400000), trend: "+26%", isPositive: true, status: "green", iconName: "users", dataKey: "g_alc", chartType: "area", format: "number", numericTarget: 1400000 },
                { id: 'g2', title: "Custo M. Impressões (CPM)", target: formatCurrency(4.00), trend: "-18%", isPositive: true, status: "green", iconName: "target", inverseLogic: true, dataKey: "g_cpm", chartType: "line", format: "currency", numericTarget: 4.00 },
                { id: 'g3', title: "Visualizações Jornalismo", target: formatNumber(3000), trend: "+12%", isPositive: false, status: "yellow", iconName: "layout-dashboard", dataKey: "g_views", chartType: "bar", format: "number", numericTarget: 3000 },
                { id: 'g4', title: "Eventos Realizados", target: "12", trend: "-58%", isPositive: false, status: "red", iconName: "calendar-days", dataKey: "g_evt", chartType: "bar", format: "number", numericTarget: 12 },
            ],
            mkt: {
                instagram: [
                    { id: 'i1', title: "Custo Mil Impressões (CPM)", target: formatCurrency(8.00), trend: "-51%", isPositive: true, status: "green", iconName: "target", inverseLogic: true, dataKey: "ig_cpm", chartType: "line", format: "currency", numericTarget: 8.00 },
                    { id: 'i2', title: "Taxa de Engajamento (ER)", target: "2,0%", trend: "+625%", isPositive: true, status: "green", iconName: "activity", dataKey: "ig_er", chartType: "bar", format: "percent", numericTarget: 2.0 },
                    { id: 'i3', title: "Taxa de Cliques (CTR)", target: "1,88%", trend: "-40%", isPositive: false, status: "red", iconName: "mouse-pointer-click", dataKey: "ig_ctr", chartType: "line", format: "percent", numericTarget: 1.88 },
                    { id: 'i4', title: "Alcance (ALC)", target: formatNumber(700000), trend: "-23%", isPositive: false, status: "red", iconName: "users", dataKey: "ig_alc", chartType: "area", format: "number", numericTarget: 700000 },
                    { id: 'i5', title: "Eficiência Cobertura (IEC)", target: formatNumber(6250), trend: "+67%", isPositive: true, status: "green", iconName: "activity", dataKey: "ig_iec", chartType: "bar", format: "number", numericTarget: 6250 },
                    { id: 'i6', title: "Custo p/ Seguidor (CPS)", target: formatCurrency(4.00), trend: "-39%", isPositive: true, status: "green", iconName: "users", inverseLogic: true, dataKey: "ig_cps", chartType: "line", format: "currency", numericTarget: 4.00 },
                ],
                linkedin: [
                    { id: 'l1', title: "Custo por Clique (CPC)", target: formatCurrency(40.00), trend: "-97%", isPositive: true, status: "green", iconName: "mouse-pointer-click", inverseLogic: true, dataKey: "li_cpc", chartType: "line", format: "currency", numericTarget: 40.00 },
                    { id: 'l2', title: "Custo Mil Impressões (CPM)", target: formatCurrency(15.00), trend: "-16%", isPositive: true, status: "green", iconName: "target", inverseLogic: true, dataKey: "li_cpm", chartType: "line", format: "currency", numericTarget: 15.00 },
                    { id: 'l3', title: "Novos Seguidores", target: "500", trend: "-32%", isPositive: false, status: "yellow", iconName: "users", dataKey: "li_foll", chartType: "area", format: "number", numericTarget: 500 },
                    { id: 'l4', title: "Taxa de Engajamento (ER)", target: "3,0%", trend: "+40%", isPositive: true, status: "green", iconName: "activity", dataKey: "li_er", chartType: "bar", format: "percent", numericTarget: 3.0 },
                ],
                youtube: [
                    { id: 'y1', title: "Retenção de Vídeo (PMV)", target: "50%", trend: "-10%", isPositive: false, status: "yellow", iconName: "clock", dataKey: "yt_pmv", chartType: "area", format: "percent", numericTarget: 50 },
                    { id: 'y2', title: "Visualizações (VVR)", target: formatNumber(10000), trend: "+25%", isPositive: true, status: "green", iconName: "youtube", dataKey: "yt_vvr", chartType: "bar", format: "number", numericTarget: 10000 },
                    { id: 'y3', title: "Inscrições", target: "200", trend: "-40%", isPositive: false, status: "red", iconName: "users", dataKey: "yt_subs", chartType: "line", format: "number", numericTarget: 200 },
                    { id: 'y4', title: "Impressões", target: formatNumber(100000), trend: "-15%", isPositive: false, status: "yellow", iconName: "target", dataKey: "yt_imp", chartType: "area", format: "number", numericTarget: 100000 },
                ],
                tiktok: [
                    { id: 't1', title: "Total Visualizações (TV)", target: formatNumber(30000), trend: "+50%", isPositive: true, status: "green", iconName: "smartphone", dataKey: "tk_tv", chartType: "bar", format: "number", numericTarget: 30000 },
                    { id: 't2', title: "Taxa de Engajamento (ER)", target: "5,0%", trend: "+70%", isPositive: true, status: "green", iconName: "activity", dataKey: "tk_er", chartType: "line", format: "percent", numericTarget: 5.0 },
                    { id: 't3', title: "Compartilhamentos", target: "500", trend: "+78%", isPositive: true, status: "green", iconName: "file-text", dataKey: "tk_share", chartType: "area", format: "number", numericTarget: 500 },
                    { id: 't4', title: "Custo por View (CPV)", target: formatCurrency(0.05), trend: "-60%", isPositive: true, status: "green", iconName: "target", inverseLogic: true, dataKey: "tk_cpv", chartType: "line", format: "currency", numericTarget: 0.05 },
                ]
            },
            jor: [
                { id: 'j1', title: "Matérias Publicadas", target: "6", trend: "-66%", isPositive: false, status: "red", iconName: "file-text", dataKey: "jor_mat", chartType: "bar", format: "number", numericTarget: 6 },
                { id: 'j2', title: "Vis. por Matéria", target: "100", trend: "+366%", isPositive: true, status: "green", iconName: "users", dataKey: "jor_views", chartType: "area", format: "number", numericTarget: 100 },
                { id: 'j3', title: "Retenção de Leitura", target: "40,0%", trend: "-18%", isPositive: false, status: "yellow", iconName: "clock", dataKey: "jor_ret", chartType: "line", format: "percent", numericTarget: 40.0 },
                { id: 'j4', title: "Cliques no Portal", target: formatNumber(1000), trend: "+20%", isPositive: true, status: "green", iconName: "mouse-pointer-click", dataKey: "jor_clicks", chartType: "bar", format: "number", numericTarget: 1000 },
            ],
            socio: [
                { id: 's1', title: "Resíduos Reciclados (kg)", target: "200", trend: "0%", isPositive: false, status: "yellow", iconName: "recycle", dataKey: "soc_res", chartType: "area", format: "number", numericTarget: 200 },
                { id: 's2', title: "Colab. Capacitados", target: "70", trend: "0%", isPositive: false, status: "yellow", iconName: "users", dataKey: "soc_colab", chartType: "bar", format: "number", numericTarget: 70 },
                { id: 's3', title: "Capacitação Comunidade", target: "150", trend: "0%", isPositive: false, status: "yellow", iconName: "graduation-cap", dataKey: "soc_cap", chartType: "line", format: "number", numericTarget: 150 },
                { id: 's4', title: "Projetos Atendidos", target: "2", trend: "0%", isPositive: false, status: "yellow", iconName: "folder-heart", dataKey: "soc_proj", chartType: "bar", format: "number", numericTarget: 2 },
            ],
            evt: [
                { id: 'e1', title: "Satisfação Geral", target: "85,0%", trend: "+10%", isPositive: true, status: "green", iconName: "smile", dataKey: "evt_sat", chartType: "area", format: "percent", numericTarget: 85.0 },
                { id: 'e2', title: "Eventos Realizados", target: "32", trend: "-93%", isPositive: false, status: "red", iconName: "calendar-days", dataKey: "evt_real", chartType: "bar", format: "number", numericTarget: 32 },
                { id: 'e3', title: "Taxa de Participação", target: "600", trend: "-88%", isPositive: false, status: "red", iconName: "users", dataKey: "evt_part", chartType: "line", format: "number", numericTarget: 600 },
                { id: 'e4', title: "Custo por Participante", target: formatCurrency(50.00), trend: "-9%", isPositive: true, status: "green", iconName: "target", inverseLogic: true, dataKey: "evt_custo", chartType: "area", format: "currency", numericTarget: 50.00 },
            ]
        };

        const areasList = [
            { id: 'global', name: 'Visão Global' },
            { id: 'mkt', name: 'Marketing e Mídias' },
            { id: 'jor', name: 'Jornalismo' },
            { id: 'socio', name: 'Socioambiental' },
            { id: 'evt', name: 'Eventos' },
        ];

        // ==========================================
        // LÓGICA DE AUTENTICAÇÃO
        // ==========================================
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const loginError = document.getElementById('login-error');

        function showLoginError(msg) {
            loginError.innerText = msg;
            loginError.classList.remove('hidden');
        }

        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ hd: "evereste.org.br" });
                
                const result = await signInWithPopup(auth, provider);
                const email = result.user.email;
                
                if (!email.endsWith('@evereste.org.br')) {
                    await signOut(auth);
                    showLoginError("Acesso negado. Utilize uma conta corporativa com final @evereste.org.br.");
                }
            } catch (error) {
                console.error(error);
                showLoginError("Falha na autenticação: Verifique se o Login via Google está ativado no Firebase Console (" + error.message + ")");
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.endsWith('@evereste.org.br')) {
                state.user = user;
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                
                document.getElementById('user-name').innerText = user.displayName || user.email;
                document.getElementById('user-avatar').src = user.photoURL || '';
                
                initFirestore();
            } else {
                state.user = null;
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // ==========================================
        // BANCO DE DADOS
        // ==========================================
        function setDbStatus(msg, statusType = 'normal') {
            document.getElementById('db-status-text').innerText = msg;
            const icon = document.getElementById('db-status-icon');
            icon.className = 'w-2 h-2 rounded-full ' + 
                (statusType === 'syncing' ? 'bg-indigo-500 animate-spin' :
                 statusType === 'success' ? 'bg-emerald-500 animate-pulse' :
                 statusType === 'error' ? 'bg-red-500' : 'bg-amber-500');
        }

        function initFirestore() {
            setDbStatus('Sincronizando...', 'syncing');
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics');
            
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => doc.data());
                data.sort((a, b) => a.timestamp - b.timestamp);
                
                state.firebaseData = data;
                if(data.length > 0) {
                    setDbStatus('Sincronizado via Firebase', 'success');
                } else {
                    setDbStatus('Banco vazio. Mostrando mock.', 'warning');
                }
                renderApp();
            }, (err) => {
                console.error(err);
                setDbStatus('Erro ao ler dados.', 'error');
            });
        }

        function getActiveData() {
            const data = state.firebaseData.length > 0 ? state.firebaseData : fallbackMonthlyData;
            if (state.timeRange === 'YTD') return data;
            return data.filter(d => d.quarter === state.timeRange);
        }

        function getCurrentKPIs() {
            if (state.selectedArea === 'mkt') return kpiDataByArea.mkt[state.selectedNetwork];
            return kpiDataByArea[state.selectedArea] || kpiDataByArea['global'];
        }

        function destroyCharts() {
            state.charts.forEach(chart => chart.destroy());
            state.charts = [];
        }

        function renderApp() {
            renderSidebar();
            const mainContent = document.getElementById('main-content');
            
            if (state.activeTab === 'dashboard') {
                document.getElementById('header-title').innerText = 'Painel de Desempenho';
                mainContent.innerHTML = buildDashboardHTML();
                
                document.getElementById('time-filter').addEventListener('change', (e) => {
                    state.timeRange = e.target.value; renderApp();
                });
                
                document.querySelectorAll('.area-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        state.selectedArea = e.target.dataset.area;
                        if(state.selectedArea !== 'mkt') state.selectedNetwork = 'instagram';
                        renderApp();
                    });
                });

                document.querySelectorAll('.network-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const target = e.target.closest('button');
                        state.selectedNetwork = target.dataset.network;
                        renderApp();
                    });
                });

                renderCharts();
            } else {
                document.getElementById('header-title').innerText = 'Gestão de Dados Mensais';
                mainContent.innerHTML = buildDataEntryHTML();
                attachDataEntryListeners();
            }
            lucide.createIcons();
        }

        function renderSidebar() {
            const nav = document.getElementById('nav-menu');
            const items = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard Central' },
                { id: 'data', icon: 'file-spreadsheet', label: 'Entrada de Dados' }
            ];
            
            nav.innerHTML = items.map(item => `
                <button data-tab="${item.id}" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${state.activeTab === item.id ? 'bg-indigo-500/10 text-indigo-400 font-semibold' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-medium'}">
                    <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                    <span class="text-sm">${item.label}</span>
                </button>
            `).join('');

            document.querySelectorAll('.tab-btn').forEach(btn => {

                const options = {
                    series: [{ name: 'Realizado', data: seriesData }],
                    chart: { type: chartType, height: '100%', toolbar: { show: false }, parentHeightOffset: 0, fontFamily: 'inherit' },

                extraBarChart.render();

        function downloadTemplateCSV() {
            // Cabeçalho obrigatório (Chaves do sistema)
            const header = "month,quarter,timestamp,g_alc,g_cpm,g_views,g_evt,ig_cpm,ig_er,ig_ctr,ig_alc,ig_iec,ig_cps,li_cpc,li_cpm,li_foll,li_er,yt_pmv,yt_vvr,yt_subs,yt_imp,tk_tv,tk_er,tk_share,tk_cpv,jor_mat,jor_views,jor_ret,jor_clicks,soc_res,soc_colab,soc_cap,soc_proj,evt_sat,evt_real,evt_part,evt_custo";
            
            // Dados de exemplo (Janeiro e Fevereiro)
            const row1 = "Jan,Q1,1,1200000,4.5,2000,1,8.0,2.5,1.8,500000,6250,4.0,40,15,100,3.0,45,10000,50,80000,30000,5.0,500,0.05,2,100,40,1000,0,0,0,0,85,0,70,50";
            const row2 = "Fev,Q1,2,1250000,4.4,2150,2,7.5,3.1,1.7,515000,6600,3.8,37,14.8,120,3.1,46,10500,60,82000,32500,5.5,530,0.04,3,140,39.4,1020,0,0,0,0,85.8,1,75,49.6";
            
            const csvContent = "data:text/csv;charset=utf-8," + [header, row1, row2].join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Modelo_Importacao_Evereste.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function attachDataEntryListeners() {
            // Liga botão de download
            document.getElementById('btn-download-template').addEventListener('click', downloadTemplateCSV);

            const uploadZone = document.getElementById('upload-zone');
            const fileInput = document.getElementById('file-input');
            const fakeBtn = document.getElementById('btn-fake-click');
            const msgContainer = document.getElementById('upload-msg-container');

            const setMsg = (text, type) => {
                msgContainer.className = `p-4 rounded-xl text-sm font-bold flex items-center gap-2 mb-4 w-full justify-center ${
                    type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' :
                    type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' :
                    type === 'warning' ? 'bg-amber-50 text-amber-700 border border-amber-200' :
                    'bg-blue-50 text-blue-700 border border-blue-200'
                }`;
                const iconName = type === 'success' ? 'check-circle-2' : type === 'error' || type === 'warning' ? 'alert-circle' : 'loader-2';
                const spinClass = type === 'info' ? 'animate-spin' : '';
                msgContainer.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5 ${spinClass}"></i> ${text}`;
                msgContainer.classList.remove('hidden');
                lucide.createIcons();
            };

            const triggerClick = () => fileInput.click();
            uploadZone.addEventListener('click', triggerClick);
            fakeBtn.addEventListener('click', (e) => { e.stopPropagation(); triggerClick(); });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const ext = file.name.split('.').pop().toLowerCase();

                if (ext === 'pdf') {
                    setMsg('Sistemas de banco de dados não extraem tabelas de PDFs de forma confiável. Por favor, use a Planilha Modelo (Excel/CSV).', 'warning');
                    return;
                }

                if (!['csv', 'xls', 'xlsx'].includes(ext)) {
                    setMsg('Formato de arquivo não suportado. Use .CSV ou .XLSX.', 'error');
                    return;
                }

                setMsg('Lendo e validando colunas da planilha...', 'info');
                
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const data = new Uint8Array(ev.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheet = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheet];
                        const parsedData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                        if (!parsedData || parsedData.length === 0) {
                            setMsg('Planilha vazia ou formato não tabular. Baixe o Modelo para verificar a estrutura correta.', 'error');
                            return;
                        }

                        // Validação simples para ver se é a planilha modelo ou a planilha visual
                        if (!parsedData[0].hasOwnProperty('month') && !parsedData[0].hasOwnProperty('g_alc')) {
                            setMsg('Atenção: A sua planilha está no formato de Relatório Visual (para humanos). Para o sistema ler, você precisa usar o formato de Banco de Dados. Clique em "Baixar Planilha Modelo" ao lado.', 'error');
                            return;
                        }

                        setMsg('Estrutura validada! Enviando dados para o servidor...', 'info');

                        for (const item of parsedData) {
                            if(item.month) {
                                Object.keys(item).forEach(key => {
                                    if (key !== 'month' && key !== 'quarter' && typeof item[key] === 'string') {
                                        const parsedNum = Number(item[key].replace(',', '.'));
                                        if (!isNaN(parsedNum)) item[key] = parsedNum;
                                    }
                                });

                                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics', item.month);
                                await setDoc(docRef, item, { merge: true });
                            }
                        }
                        
                        setMsg('Upload realizado com sucesso! Atualizando dashboard...', 'success');
                        setTimeout(() => {
                            state.activeTab = 'dashboard';
                            renderApp();
                        }, 2000);
                        
                    } catch (err) {
                        console.error(err);
                        setMsg('Erro interno ao processar a planilha. Verifique a formatação.', 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
