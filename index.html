        const loginError = document.getElementById('login-error');

        function showLoginError(msg) {
            loginError.innerText = msg;
            loginError.classList.remove('hidden');
        }

        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ hd: "evereste.org.br" });
                
                const result = await signInWithPopup(auth, provider);
                const email = result.user.email;
                
                if (!email.endsWith('@evereste.org.br')) {
                    await signOut(auth);
                    showLoginError("Acesso negado. Utilize uma conta corporativa com final @evereste.org.br.");
                }
            } catch (error) {
                console.error(error);
                showLoginError("Falha na autenticação: Verifique se o Login via Google está ativado no Firebase Console (" + error.message + ")");
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.endsWith('@evereste.org.br')) {
                state.user = user;
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                
                document.getElementById('user-name').innerText = user.displayName || user.email;
                document.getElementById('user-avatar').src = user.photoURL || '';
                
                initFirestore();
            } else {
                state.user = null;
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // ==========================================
        // BANCO DE DADOS E SINCRONIZAÇÃO
        // ==========================================
        function setDbStatus(msg, statusType = 'normal') {
            document.getElementById('db-status-text').innerText = msg;
            const icon = document.getElementById('db-status-icon');
            icon.className = 'w-2 h-2 rounded-full ' + 
                (statusType === 'syncing' ? 'bg-indigo-500 animate-spin' :
                 statusType === 'success' ? 'bg-emerald-500 animate-pulse' :
                 statusType === 'error' ? 'bg-red-500' : 'bg-amber-500');
        }

        function initFirestore() {
            setDbStatus('Sincronizando...', 'syncing');
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics');
            
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => doc.data());
                data.sort((a, b) => a.timestamp - b.timestamp);
                
                state.firebaseData = data;
                if(data.length > 0) {
                    setDbStatus('Sincronizado via Firebase', 'success');
                } else {
                    setDbStatus('Banco vazio. Vá em Inserir Dados.', 'warning');
                }
                renderApp();
            }, (err) => {
                console.error(err);
                setDbStatus('Erro ao ler dados.', 'error');
            });
        }

        function getActiveData() {
            const data = state.firebaseData.length > 0 ? state.firebaseData : fallbackMonthlyData;
            if (state.timeRange === 'YTD') return data;
            return data.filter(d => d.quarter === state.timeRange);
        }

        function getCurrentKPIs() {
            if (state.selectedArea === 'mkt') return kpiDataByArea.mkt[state.selectedNetwork];
            return kpiDataByArea[state.selectedArea] || kpiDataByArea['global'];
        }

        function destroyCharts() {
            state.charts.forEach(chart => chart.destroy());
            state.charts = [];
        }

        function renderApp() {
            renderSidebar();
            const mainContent = document.getElementById('main-content');
            
            if (state.activeTab === 'dashboard') {
                document.getElementById('header-title').innerText = 'Painel de Desempenho';
                mainContent.innerHTML = buildDashboardHTML();
                
                document.getElementById('time-filter').addEventListener('change', (e) => {
                    state.timeRange = e.target.value; renderApp();
                });
                
                document.querySelectorAll('.area-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        state.selectedArea = e.target.dataset.area;
                        if(state.selectedArea !== 'mkt') state.selectedNetwork = 'instagram';
                        renderApp();
                    });
                });

                document.querySelectorAll('.network-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const target = e.target.closest('button');
                        state.selectedNetwork = target.dataset.network;
                        renderApp();
                    });
                });

                renderCharts();
            } else {
                document.getElementById('header-title').innerText = 'Inserção de Dados Mensais';
                mainContent.innerHTML = buildManualEntryHTML();
                attachManualEntryListeners();
            }
            lucide.createIcons();
        }

        function renderSidebar() {
            const nav = document.getElementById('nav-menu');
            const items = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard Central' },
                { id: 'data', icon: 'edit-3', label: 'Inserir Dados' }
            ];
            
            nav.innerHTML = items.map(item => `
                <button data-tab="${item.id}" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${state.activeTab === item.id ? 'bg-indigo-500/10 text-indigo-400 font-semibold' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-medium'}">
                    <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                    <span class="text-sm">${item.label}</span>
                </button>
            `).join('');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.activeTab = e.target.closest('button').dataset.tab;
                    renderApp();
                });
            });
        }

        function renderCharts() {
            destroyCharts();
            const data = getActiveData();
            const currentKPIs = getCurrentKPIs();
            const categories = data.map(d => d.month);

            currentKPIs.forEach(kpi => {
                const seriesData = data.map(d => d[kpi.dataKey] || 0);
                let chartType = kpi.chartType;
                let colors = ['#4f46e5'];
                if (chartType === 'line') colors = ['#f59e0b'];
                if (chartType === 'bar') colors = ['#0ea5e9'];

                const options = {
                    series: [{ name: 'Realizado', data: seriesData }],
                    chart: { type: chartType, height: '100%', toolbar: { show: false }, parentHeightOffset: 0, fontFamily: 'inherit' },
                    colors: colors,
                    fill: { type: chartType === 'area' ? 'gradient' : 'solid', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0, stops: [0, 90, 100] } },
                    dataLabels: { enabled: false },
                    stroke: { curve: 'smooth', width: chartType === 'bar' ? 0 : 3 },
                    xaxis: { categories: categories, axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#94a3b8', fontSize: '11px' } } },
                    yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '11px' }, formatter: (value) => formatValue(value, kpi.format) } },
                    grid: { borderColor: '#f1f5f9', strokeDashArray: 4, padding: { top: 0, right: 0, bottom: 0, left: 10 } },
                    annotations: { yaxis: [{ y: kpi.numericTarget, borderColor: '#94a3b8', strokeDashArray: 4, label: { text: 'Meta', style: { color: '#fff', background: '#94a3b8', fontSize: '10px' } } }] },
                    tooltip: { y: { formatter: (value) => formatValue(value, kpi.format) } }
                };

                const el = document.querySelector(`#chart-${kpi.id}`);
                if (el) {
                    const chart = new ApexCharts(el, options);
                    chart.render();
                    state.charts.push(chart);
                }
            });

            // Gráficos Extras 
            const extraBarEl = document.querySelector("#chart-extra-bar");
            if (extraBarEl) {
                const alcances = data.map(d => d.ig_alc || 0);
                const engajamentos = data.map(d => d.ig_er || 0);

                const extraBarOptions = {
                    series: [
                        { name: 'Alcance IG', data: alcances }, 
                        { name: 'Engajamento IG (%)', data: engajamentos }
                    ],
                    chart: { type: 'bar', height: '100%', toolbar: { show: false }, fontFamily: 'inherit' },
                    plotOptions: { bar: { horizontal: false, columnWidth: '45%', borderRadius: 4 } },
                    dataLabels: { enabled: false },
                    stroke: { show: true, width: 2, colors: ['transparent'] },
                    xaxis: { categories: categories, labels: { style: { colors: '#94a3b8' } }, axisBorder: { show: false }, axisTicks: { show: false } },
                    yaxis: { labels: { style: { colors: '#94a3b8' }, formatter: (val) => formatNumber(val) } },
                    fill: { opacity: 1 },
                    colors: ['#4f46e5', '#0ea5e9'],
                    grid: { borderColor: '#f1f5f9', strokeDashArray: 4 },
                    legend: { position: 'top', horizontalAlign: 'right', fontSize: '12px', markers: { radius: 12 } }
                };
                const extraBarChart = new ApexCharts(extraBarEl, extraBarOptions);
                extraBarChart.render();
                state.charts.push(extraBarChart);
            }

            const extraDonutEl = document.querySelector("#chart-extra-donut");
            if (extraDonutEl) {
                const last = data[data.length-1] || fallbackMonthlyData[0];
                const sumIG = last.ig_alc || 10;
                const sumLI = (last.li_foll * 100) || 5;
                const sumYT = last.yt_vvr || 2;
                const sumTK = last.tk_tv || 8;

                const extraDonutOptions = {
                    series: [sumIG, sumLI, sumYT, sumTK],
                    labels: ['Instagram', 'LinkedIn', 'YouTube', 'TikTok'],
                    chart: { type: 'donut', height: '100%', fontFamily: 'inherit' },
                    colors: ['#ec4899', '#0ea5e9', '#ef4444', '#111827'],
                    plotOptions: { pie: { donut: { size: '75%', labels: { show: true, name: { show: true, fontSize: '14px', color: '#64748b' }, value: { show: true, fontSize: '24px', fontWeight: 'bold', color: '#1e293b', formatter: (val)=> formatNumber(val) }, total: { show: true, label: 'Tráfego Volume', color: '#64748b', formatter: function (w) { return formatNumber(w.globals.seriesTotals.reduce((a, b) => a + b, 0)) } } } } } },
                    dataLabels: { enabled: false },
                    legend: { position: 'bottom', fontSize: '12px', markers: { radius: 12 } },
                    stroke: { show: true, width: 3, colors: ['#ffffff'] }
                };
                const extraDonutChart = new ApexCharts(extraDonutEl, extraDonutOptions);
                extraDonutChart.render();
                state.charts.push(extraDonutChart);
            }
        }

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Mês de Referência</label>

                    <div class="flex justify-end pt-6 border-t border-slate-100">
                        <button id="btn-save-entry" class="px-8 py-3.5 bg-slate-900 text-white rounded-xl font-bold hover:bg-indigo-600 shadow-lg shadow-slate-900/20 transition-all flex items-center gap-2">

        function attachManualEntryListeners() {
            // Atualiza Interface ao trocar de Mês ou Área
            document.getElementById('entry-month').addEventListener('change', (e) => {
                state.entryMonth = e.target.value;
                renderApp();
            });
            document.getElementById('entry-category').addEventListener('change', (e) => {
                state.entryCategory = e.target.value;
                renderApp();
            });

            const btnSave = document.getElementById('btn-save-entry');
            const msgContainer = document.getElementById('entry-msg-container');

            const setMsg = (text, type) => {
                msgContainer.className = `p-4 rounded-xl text-sm font-bold flex items-center gap-2 mb-4 w-full ${
                    type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' :
                    type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' :
                    'bg-blue-50 text-blue-700 border border-blue-200'
                }`;
                const iconName = type === 'success' ? 'check-circle-2' : type === 'error' ? 'alert-circle' : 'loader-2';
                const spinClass = type === 'info' ? 'animate-spin' : '';
                msgContainer.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5 ${spinClass}"></i> ${text}`;
                msgContainer.classList.remove('hidden');
                lucide.createIcons();
            };

            btnSave.addEventListener('click', async () => {
                setMsg('Calculando e sincronizando com o Banco...', 'info');
                btnSave.disabled = true;

                try {
                    const def = formDefinitions[state.entryCategory];
                    const rawValues = {};
                    
                    // Extração dos valores dos inputs do HTML
                    def.fields.forEach(f => {
                        const val = document.getElementById(`input-${f.id}`).value;
                        // Aceita ',' ou '.' como separador decimal para evitar erro humano
                        rawValues[f.id] = val ? parseFloat(val.replace(',', '.')) : 0;
                    });

                    // Invoca função de Cálculo específica de cada Área
                    const calculatedKPIs = def.calculate(rawValues);
                    
                    const mInfo = monthsInfo.find(m => m.m === state.entryMonth);

                    const dataToSave = {
                        ...calculatedKPIs,
                        month: mInfo.m,
                        quarter: mInfo.q,
                        timestamp: mInfo.t
                    };

                    // Guardar no banco de dados (merge true = não apaga dados das outras abas para o mesmo mês)
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics', state.entryMonth);
                    await setDoc(docRef, dataToSave, { merge: true });

                    setMsg(`Dados de ${def.title} guardados! Os KPIs foram atualizados.`, 'success');
                    
                    // Limpar Form
                    def.fields.forEach(f => { document.getElementById(`input-${f.id}`).value = ''; });

                } catch (err) {
                    console.error(err);
                    setMsg('Falha ao gravar no Firebase. Verifique sua conexão.', 'error');
                } finally {
                    btnSave.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
