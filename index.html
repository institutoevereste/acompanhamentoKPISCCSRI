        function getDocValue(d, kpi) {
            if (kpi.dataKeys) {
                let sum = 0; let count = 0;
                kpi.dataKeys.forEach(key => {
                    let v = parseFloat(d[key] || 0);
                    if (v > 0) { sum += v; count++; }
                });
                if (kpi.agg === 'avg') return count > 0 ? sum / count : 0;
                return sum;
            }
            return parseFloat(d[kpi.dataKey] || 0);
        }

        function getAggregatedValue(dataArray, kpi) {
            if (!dataArray || dataArray.length === 0) return 0;
            let sum = 0; let count = 0;
            dataArray.forEach(d => {
                const val = getDocValue(d, kpi);
                if (val > 0 || val < 0) { sum += val; count++; }
            });
            return kpi.agg === 'avg' && count > 0 ? sum / count : sum;
        }

        function calculateAchievement(value, target, inverseLogic) {
            if (!target || target === 0) return { percent: 0, status: 'slate', label: 'SEM META' };
            
            let percent = 0;
            if (inverseLogic) {
                percent = value === 0 ? 0 : (target / value) * 100;
            } else {
                percent = (value / target) * 100;
            }

            let status = 'red'; let label = 'CRÍTICO';
            if (percent >= 100) { status = 'green'; label = 'NO ALVO'; } 
            else if (percent >= 80) { status = 'yellow'; label = 'ATENÇÃO'; }

            return { percent, status, label };
        }

        // AUTENTICAÇÃO
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const loginError = document.getElementById('login-error');

        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ hd: "evereste.org.br" });
                const result = await signInWithPopup(auth, provider);
                if (!result.user.email.endsWith('@evereste.org.br')) {
                    await signOut(auth);
                    loginError.innerText = "Acesso negado. Utilize uma conta corporativa @evereste.org.br.";
                    loginError.classList.remove('hidden');
                }
            } catch (error) {
                loginError.innerText = "Falha na autenticação.";
                loginError.classList.remove('hidden');
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.endsWith('@evereste.org.br')) {
                state.user = user;
                state.canEdit = AUTHORIZED_EDITORS.includes(user.email.toLowerCase());
                
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName || user.email;
                document.getElementById('user-avatar').src = user.photoURL || '';
                initFirestore();

                state.user = null;
                state.canEdit = false;
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }

        function setDbStatus(msg, statusType = 'normal') {
            document.getElementById('db-status-text').innerText = msg;
            const icon = document.getElementById('db-status-icon');
            icon.className = 'w-2 h-2 rounded-full ' + 
                (statusType === 'syncing' ? 'bg-indigo-500 animate-spin' :
                 statusType === 'success' ? 'bg-emerald-500 animate-pulse' :
                 statusType === 'error' ? 'bg-red-500' : 'bg-amber-500');
        }

        function initFirestore() {
            setDbStatus('Sincronizando...', 'syncing');
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics');
            
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => doc.data());
                data.sort((a, b) => a.timestamp - b.timestamp);
                state.firebaseData = data;
                if(data.length > 0) setDbStatus('Sincronizado via Firebase', 'success');
                else setDbStatus('Banco vazio. Vá em Inserir Dados.', 'warning');
                renderApp();
            }, (err) => {
                console.error(err);
                setDbStatus('Erro ao ler dados.', 'error');
            });
        }

        function getActiveData() {
            const data = state.firebaseData.length > 0 ? state.firebaseData : fallbackMonthlyData;
            if (state.timeRange === 'YTD' || state.isComparativeMode) return data;
            return data.filter(d => d.quarter === state.timeRange);
        }

        function getCurrentKPIs(activeData) {
            let kpis = [];
            if (state.selectedArea === 'mkt') {
                kpis = JSON.parse(JSON.stringify(kpiDataByArea.mkt[state.selectedNetwork]));
            } else {
                kpis = JSON.parse(JSON.stringify(kpiDataByArea[state.selectedArea] || kpiDataByArea['global']));
            }

            // Metas dinâmicas
            kpis.forEach(k => {
                const isEventTarget = (k.dataKey === 'soc_evt' || (k.dataKeys && k.dataKeys.includes('soc_evt')));
                const isJorTarget = (k.dataKey === 'jor_mat' || (k.dataKeys && k.dataKeys.includes('jor_mat')));
                const isSocCapTarget = (k.dataKey === 'soc_cap' || (k.dataKeys && k.dataKeys.includes('soc_cap')));
                const isSocPppTarget = (k.dataKey === 'soc_ppp');
                const isAlcTarget = (k.dataKey === 'ig_alc' || (k.dataKeys && k.dataKeys.includes('ig_alc')));
                const isERTarget = (k.dataKey === 'ig_er' || k.dataKey === 'tk_er');

                if (isEventTarget) {
                    if (state.isComparativeMode) k.numericTarget = 8;
                    else if (state.timeRange === 'YTD') k.numericTarget = 32;
                    else k.numericTarget = 8;
                }
                if (isJorTarget) {
                    if (state.isComparativeMode) k.numericTarget = 6; 
                    else if (state.timeRange === 'YTD') k.numericTarget = 24;
                    else k.numericTarget = 6;
                }
                if (isSocCapTarget) {
                    if (state.isComparativeMode) k.numericTarget = 150; 
                    else if (state.timeRange === 'YTD') k.numericTarget = 600;
                    else k.numericTarget = 150;
                }
                if (isAlcTarget) {
                    if (state.isComparativeMode) k.numericTarget = 700000; 
                    else if (state.timeRange === 'YTD') k.numericTarget = 2800000;
                    else k.numericTarget = 700000;
                }
                if (isERTarget) {
                    if (state.isComparativeMode) k.numericTarget = 300; 
                    else if (state.timeRange === 'YTD') k.numericTarget = 1200;
                    else k.numericTarget = 300;
                }
                if (isSocPppTarget && activeData) {
                    const totalSocEvents = getAggregatedValue(activeData, { dataKey: 'soc_evt', agg: 'sum' });
                    if (state.isComparativeMode) k.numericTarget = totalSocEvents / 4;
                    else k.numericTarget = totalSocEvents;
                }
            });
            
            return kpis;
        }

            state.charts.forEach(chart => chart.destroy());

        function generateForecast(dataArray) {
            if (dataArray.length < 2) return [];
            let last3 = dataArray.slice(-3);
            let diffSum = 0;
            for(let i = 1; i < last3.length; i++) diffSum += (last3[i] - last3[i-1]);
            let avgStep = diffSum / (last3.length - 1);
            let lastVal = dataArray[dataArray.length - 1];
            return [ Math.max(0, lastVal + avgStep), Math.max(0, lastVal + avgStep * 2), Math.max(0, lastVal + avgStep * 3) ];
        }

        function renderCharts() {
            destroyCharts();
            const fullData = state.firebaseData.length > 0 ? state.firebaseData : fallbackMonthlyData;
            const activeData = getActiveData();
            const currentKPIs = getCurrentKPIs(activeData);

            currentKPIs.forEach(kpi => {
                let options = {};
                if (state.isComparativeMode) {
                    const qData = { 'Q1': [], 'Q2': [], 'Q3': [], 'Q4': [] };
                    fullData.forEach(d => {
                        const hasData = kpi.dataKeys ? kpi.dataKeys.some(key => d[key] !== undefined) : d[kpi.dataKey] !== undefined;
                        if (hasData) qData[d.quarter].push(d);
                    });
                    const categories = ['Q1', 'Q2', 'Q3', 'Q4'];
                    const seriesData = categories.map(q => getAggregatedValue(qData[q], kpi));
                    options = {
                        series: [{ name: 'Resultado', data: seriesData }],
                        chart: { type: 'bar', height: '100%', toolbar: { show: false }, fontFamily: 'inherit' },
                        colors: ['#4f46e5'],
                        plotOptions: { bar: { borderRadius: 4, columnWidth: '50%' } },
                        dataLabels: { enabled: false },
                        xaxis: { categories: categories, axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#94a3b8' } } },
                        yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '11px' }, formatter: (value) => formatValue(value, kpi.format) } },
                        grid: { borderColor: '#f1f5f9', strokeDashArray: 4 },
                        tooltip: { y: { formatter: (value) => formatValue(value, kpi.format) } }
                    };
                } else {
                    const categories = activeData.map(d => d.month);
                    let seriesData = activeData.map(d => getDocValue(d, kpi));
                    let forecastCount = 0;
                    if (state.timeRange === 'YTD' || state.selectedArea === 'global') {
                        const predicted = generateForecast(seriesData);
                        if (predicted.length > 0) {
                            seriesData = [...seriesData, ...predicted];
                            categories.push(...['M+1', 'M+2', 'M+3']);
                            forecastCount = predicted.length;
                        }
                    }
                    let chartType = kpi.chartType;
                    let colors = ['#0ea5e9'];
                    if (chartType === 'line') colors = ['#f59e0b'];
                    options = {
                        series: [{ name: 'Realizado/Predição', data: seriesData }],
                        chart: { type: chartType === 'bar' ? 'line' : chartType, height: '100%', width: '100%', toolbar: { show: false }, fontFamily: 'inherit', parentHeightOffset: 0 },
                        colors: colors,
                        stroke: { curve: 'smooth', width: 3 },
                        forecastDataPoints: { count: forecastCount, dashArray: 4 },
                        fill: { type: chartType === 'area' ? 'gradient' : 'solid' },
                        dataLabels: { enabled: false },
                        xaxis: { categories: categories, axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#94a3b8', fontSize: '11px' }, hideOverlappingLabels: true, trim: true } },
                        yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '11px' }, formatter: (value) => formatValue(value, kpi.format) } },
                        grid: { borderColor: '#f1f5f9', strokeDashArray: 4, padding: { left: 10, right: 10, bottom: 0 } },
                        annotations: { yaxis: [{ y: kpi.numericTarget, borderColor: '#cbd5e1', strokeDashArray: 4, label: { text: 'Meta', style: { color: '#fff', background: '#94a3b8', fontSize: '10px' } } }] },
                        tooltip: { theme: 'light', y: { formatter: (value) => formatValue(value, kpi.format) } }
                    };
                }
                const el = document.querySelector(`#chart-${kpi.id}`);
                if (el) { const chart = new ApexCharts(el, options); chart.render(); state.charts.push(chart); }
            });
        }

        function attachManualEntryListeners() {
            document.getElementById('entry-month').addEventListener('change', (e) => { state.entryMonth = e.target.value; renderApp(); });
            document.getElementById('entry-category').addEventListener('change', (e) => { state.entryCategory = e.target.value; renderApp(); });

            const btnSave = document.getElementById('btn-save-entry');
            const msgContainer = document.getElementById('entry-msg-container');

            const setMsg = (text, type) => {
                msgContainer.className = `p-4 rounded-xl text-sm font-bold flex items-center gap-2 mb-4 w-full ${ type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-blue-50 text-blue-700 border border-blue-200' }`;
                msgContainer.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle-2' : type === 'error' ? 'alert-circle' : 'loader-2'}" class="w-5 h-5 ${type === 'info' ? 'animate-spin' : ''}"></i> ${text}`;
                msgContainer.classList.remove('hidden');
                lucide.createIcons();
            };

            btnSave.addEventListener('click', async () => {
                setMsg('Sincronizando com o Banco...', 'info');
                btnSave.disabled = true;
                try {
                    const def = formDefinitions[state.entryCategory];
                    const rawValues = {};
                    def.fields.forEach(f => {
                        const val = document.getElementById(`input-${f.id}`).value;
                        rawValues[f.id] = val ? parseFloat(val.replace(',', '.')) : 0;
                    });
                    const mInfo = monthsInfo.find(m => m.m === state.entryMonth);
                    const dataToSave = { ...rawValues, month: mInfo.m, quarter: mInfo.q, timestamp: mInfo.t };
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'monthlyMetrics', state.entryMonth);
                    await setDoc(docRef, dataToSave, { merge: true });
                    setMsg(`Dados de ${def.title} guardados com sucesso!`, 'success');
                    def.fields.forEach(f => { document.getElementById(`input-${f.id}`).value = ''; });
                } catch (err) {
                    setMsg('Falha ao gravar no Firebase. Verifique sua conexão.', 'error');
                } finally {
                    btnSave.disabled = false;
                }
            });
        }

        // ==========================================
        // GERAÇÃO DE RELATÓRIO PDF (HTML2PDF)
        // ==========================================
        function generatePDFReport(areaId, period) {
            const btnGen = document.getElementById('btn-generate-pdf');
            btnGen.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> GERANDO RELATÓRIO...';
            btnGen.disabled = true;
            lucide.createIcons();

            const allData = state.firebaseData.length > 0 ? state.firebaseData : fallbackMonthlyData;
            const periodData = period === 'YTD' ? allData : allData.filter(d => d.quarter === period);
            
            let kpisToReport = [];
            let reportTitle = "Relatório de Desempenho";
            
            if (areaId === 'global') {
                kpisToReport = kpiDataByArea.global;
                reportTitle = "Visão Global - Resumo Institucional";
            } else if (areaId.startsWith('mkt_')) {
                const net = areaId.split('_')[1];
                const netMap = { 'ig': 'instagram', 'li': 'linkedin', 'yt': 'youtube', 'tk': 'tiktok' };
                kpisToReport = kpiDataByArea.mkt[netMap[net]];
                reportTitle = `Marketing e Publicidade: ${netMap[net].charAt(0).toUpperCase() + netMap[net].slice(1)}`;
            } else {
                kpisToReport = kpiDataByArea[areaId];
                const areaNames = { 'jor': 'Unidade de Jornalismo e Conteúdo', 'soc': 'Iniciativas Socioambientais', 'des': 'Design e Comunicação Visual' };
                reportTitle = `CCRI: ${areaNames[areaId]}`;
            }
            
            kpisToReport = JSON.parse(JSON.stringify(kpisToReport));
            kpisToReport.forEach(k => {
                const isEventTarget = (k.dataKey === 'soc_evt' || (k.dataKeys && k.dataKeys.includes('soc_evt')));
                const isJorTarget = (k.dataKey === 'jor_mat' || (k.dataKeys && k.dataKeys.includes('jor_mat')));
                const isSocCapTarget = (k.dataKey === 'soc_cap' || (k.dataKeys && k.dataKeys.includes('soc_cap')));
                const isSocPppTarget = (k.dataKey === 'soc_ppp');
                const isAlcTarget = (k.dataKey === 'ig_alc' || (k.dataKeys && k.dataKeys.includes('ig_alc')));
                const isERTarget = (k.dataKey === 'ig_er' || k.dataKey === 'tk_er');

                if (isEventTarget) k.numericTarget = period === 'YTD' ? 32 : 8;
                if (isJorTarget) k.numericTarget = period === 'YTD' ? 24 : 6;
                if (isSocCapTarget) k.numericTarget = period === 'YTD' ? 600 : 150;
                if (isAlcTarget) k.numericTarget = period === 'YTD' ? 2800000 : 700000;
                if (isERTarget) k.numericTarget = period === 'YTD' ? 1200 : 300;
                if (isSocPppTarget) k.numericTarget = getAggregatedValue(periodData, { dataKey: 'soc_evt', agg: 'sum' });
            });

            let tableRows = kpisToReport.map(kpi => {
                const aggValue = getAggregatedValue(periodData, kpi);
                const valFormatted = formatValue(aggValue, kpi.format);
                const targetFormatted = formatValue(kpi.numericTarget, kpi.format);
                const achv = calculateAchievement(aggValue, kpi.numericTarget, kpi.inverseLogic);
                
                let statusColor = '#64748b';
                if(achv.status === 'green') statusColor = '#10b981';
                if(achv.status === 'red') statusColor = '#ef4444';
                if(achv.status === 'yellow') statusColor = '#f59e0b';

                return `
                    <tr style="border-bottom: 1px solid #e2e8f0;">
                        <td style="padding: 14px 8px; font-weight: 700; color: #1e293b; vertical-align: middle;">${kpi.title}</td>
                        <td style="padding: 14px 8px; color: #64748b; vertical-align: middle;">${targetFormatted}</td>
                        <td style="padding: 14px 8px; font-weight: bold; color: #0f172a; vertical-align: middle; font-size: 15px;">${valFormatted}</td>
                        <td style="padding: 14px 8px; font-weight: 900; color: ${statusColor}; vertical-align: middle;">${achv.percent.toFixed(2).replace('.', ',')}%</td>
                        <td style="padding: 14px 8px; vertical-align: middle;">
                            <span style="background-color: ${statusColor}15; border: 1px solid ${statusColor}30; color: ${statusColor}; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase;">
                                ${achv.label}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');

            const dateStr = new Date().toLocaleDateString('pt-BR');
            const periodLabel = period === 'YTD' ? 'Acumulado Anual (YTD)' : `${period} (Trimestral)`;

            const htmlContent = `
                <div style="padding: 40px; font-family: Helvetica, Arial, sans-serif; color: #1e293b; background: #ffffff;">
                    <table style="width: 100%; border-bottom: 4px solid #4f46e5; padding-bottom: 20px; margin-bottom: 30px;">
                        <tr>
                            <td style="vertical-align: bottom;">
                                <h1 style="margin: 0; color: #0f172a; font-size: 28px; font-weight: 900; letter-spacing: -1px;">Instituto Evereste</h1>
                                <p style="margin: 4px 0 0 0; color: #64748b; font-size: 14px; font-weight: 500;">Painel de Inteligência CCRI Estratégico</p>
                            </td>
                            <td style="text-align: right; vertical-align: bottom;">
                                <p style="margin: 0; color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Data de Geração</p>
                                <p style="margin: 2px 0 0 0; color: #0f172a; font-size: 14px; font-weight: bold;">${dateStr}</p>
                            </td>
                        </tr>
                    </table>

                    <div style="margin-bottom: 30px; background-color: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <h2 style="margin: 0 0 10px 0; color: #1e293b; font-size: 20px; font-weight: 800;">${reportTitle}</h2>
                        <table style="width: 100%;">
                            <tr>
                                <td style="width: 50%;">
                                    <span style="color: #64748b; font-size: 11px; font-weight: bold; text-transform: uppercase;">Período Analisado</span><br>
                                    <span style="color: #0f172a; font-size: 14px; font-weight: 600;">${periodLabel}</span>
                                </td>
                                <td style="width: 50%;">
                                    <span style="color: #64748b; font-size: 11px; font-weight: bold; text-transform: uppercase;">Estado dos Dados</span><br>
                                    <span style="color: #10b981; font-size: 14px; font-weight: 600;">Sincronizado via Firebase</span>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <h3 style="margin: 0 0 12px 0; color: #0f172a; font-size: 16px; font-weight: bold;">Resultados Consolidados</h3>
                    <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                        <thead>
                            <tr style="background-color: #f1f5f9; border-bottom: 2px solid #cbd5e1;">
                                <th style="padding: 12px 8px; color: #475569; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Indicador Estratégico (KPI)</th>
                                <th style="padding: 12px 8px; color: #475569; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Meta Oficial</th>
                                <th style="padding: 12px 8px; color: #475569; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Resultado Atual</th>
                                <th style="padding: 12px 8px; color: #475569; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">% Atingimento</th>
                                <th style="padding: 12px 8px; color: #475569; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                    
                    <div style="margin-top: 40px; padding-top: 15px; border-top: 1px solid #e2e8f0; text-align: center;">
                        <p style="color: #94a3b8; font-size: 11px; font-weight: 500; margin: 0;">Este é um documento oficial emitido pelo Sistema de Acompanhamento de KPIs do CCRI para 2026.</p>
                    </div>
                </div>
            `;

            const opt = {
                margin:       [15, 15, 15, 15],
                filename:     `Relatorio_CCRI_${areaId}_${period}.pdf`,
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(htmlContent).save().then(() => {
                document.getElementById('report-modal').classList.add('hidden');
                btnGen.innerHTML = '<i data-lucide="download" class="w-5 h-5"></i> BAIXAR RELATÓRIO PDF';
                btnGen.disabled = false;
                lucide.createIcons();
            }).catch(err => {
                console.error("Erro ao gerar PDF:", err);
                btnGen.innerHTML = '<i data-lucide="download" class="w-5 h-5"></i> ERRO. TENTAR NOVAMENTE';
                btnGen.disabled = false;
                lucide.createIcons();
            });
        }

        // --- LÓGICA DO MENU E MODAL ---
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            const reportModal = document.getElementById('report-modal');

            function toggleSidebar() {
                if(!sidebar || !backdrop) return;
                sidebar.classList.toggle('-translate-x-full');
                backdrop.classList.toggle('hidden');
                setTimeout(() => backdrop.classList.toggle('opacity-0'), 10);
            }
            if(mobileBtn) mobileBtn.addEventListener('click', toggleSidebar);
            if(backdrop) backdrop.addEventListener('click', toggleSidebar);
            document.getElementById('nav-menu').addEventListener('click', (e) => {
                if (window.innerWidth < 768 && e.target.closest('.tab-btn')) toggleSidebar();
            });

            document.getElementById('btn-open-report').addEventListener('click', () => {
                reportModal.classList.remove('hidden');
            });
            document.getElementById('btn-close-report').addEventListener('click', () => {
                reportModal.classList.add('hidden');
            });
            document.getElementById('btn-generate-pdf').addEventListener('click', () => {
                const area = document.getElementById('report-area').value;
                const period = document.getElementById('report-period').value;
                generatePDFReport(area, period);
            });
        });
    </script>
</body>
</html>
